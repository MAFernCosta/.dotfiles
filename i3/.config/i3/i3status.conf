general {
	output_format = "i3bar"
	colors = false
	markup = pango
	interval = 5
}

order += "load"
order += "cpu_temperature 0"
order += "wireless wlp82s0"
order += "volume master"
order += "battery 0"
order += "time"

load {
	format = "<span size='12000' >  </span><span >  %5min Load  </span>"
}

cpu_temperature 0 {
	format = "<span >  </span><span>  %degrees °C  </span>"
	path = "/sys/class/thermal/thermal_zone0/temp"
}

wireless wlp82s0 {
	format_up = "<span>  </span><span>  %essid  </span>"
	format_down = "<span>   </span><span>  Disconnected  </span>"
}

volume master {
	format = "<span>  </span><span>  %volume  </span>"
	format_muted = "<span>  </span><span>  Muted  </span>"
	device = "default"
	mixer = "Master"
	mixer_idx = 0
}

battery 0 {
	last_full_capacity = true
	format = "<span>  %status  </span><span>  %percentage  </span>"
	format_down = "No Battery"
	status_chr = " "
	status_bat = " "
	status_unk = " "
	status_full = " "
	path = "/sys/class/power_supply/BAT%d/uevent"
	low_threshold = 10
	integer_battery_capacity = true
}

time {
	format = "<span>  </span><span>  %d.%m.%y %H:%M  </span>"
}
